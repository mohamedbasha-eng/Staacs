<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Staccs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: 'Inter', sans-serif;
    }
    .login-container {
      background: var(--bg-secondary);
      padding: 3rem;
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
    h1 {
      color: var(--accent);
      margin-bottom: 2rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
      text-align: left;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 1rem;
      border: 1px solid var(--border);
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border-radius: 8px;
      font-size: 1rem;
      box-sizing: border-box;
      transition: all 0.3s ease;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(201, 169, 94, 0.2);
    }
    button {
      width: 100%;
      padding: 1rem;
      background: var(--accent);
      color: var(--bg-primary);
      border: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(201, 169, 94, 0.4);
    }
    .error {
      color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      padding: 1rem;
      border-radius: 8px;
      margin-top: 1.5rem;
      display: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>🛡️ Secure Login</h1>
    <form id="adminLoginForm">
      <div class="form-group">
        <label for="email">Admin Email</label>
        <input type="email" id="email" placeholder="example@gmail.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" id="loginBtn">Login to Dashboard</button>
      <div id="errorMsg" class="error">Invalid credentials.</div>
    </form>
  </div>
  
  <script type="module" src="login.js"></script>
</body>
</html>
