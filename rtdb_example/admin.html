<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Realtime DB</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="glass-container">
        <h1>Admin Dashboard 🛡️</h1>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">Add new products directly to Firebase Realtime Database.</p>
        
        <form id="productForm">
            <div class="form-group">
                <label for="productName">Product Name</label>
                <input type="text" id="productName" placeholder="e.g. Modern Hoodie" required>
            </div>
            <div class="form-group">
                <label for="productPrice">Price ($)</label>
                <input type="number" id="productPrice" placeholder="e.g. 59.99" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="productImage">Image Link (URL)</label>
                <input type="url" id="productImage" placeholder="https://example.com/image.png" required>
            </div>
            <div class="form-group">
                <label for="productDesc">Description</label>
                <textarea id="productDesc" rows="3" placeholder="Describe the product..." required></textarea>
            </div>
            <button type="submit" class="btn btn-primary" id="saveButton">Save Product</button>
        </form>
    </div>

    <div class="glass-container">
        <h2>Manage Products</h2>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Price</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="productsTableBody">
                    <tr><td colspan="4" style="text-align: center;"><div class="loader"></div></td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- We use type="module" to use ES6 import/export natively in Vanilla JS -->
    <script type="module" src="admin.js"></script>
</body>
</html>
